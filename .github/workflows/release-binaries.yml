name: Release Binaries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'The tag to build and release (e.g., v1.0.0)'
        required: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Set tag reference
        id: set_ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "REF=refs/tags/${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "REF=${{ github.ref }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository at specific tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.set_ref.outputs.REF }}

      - uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=$(basename ${{ steps.set_ref.outputs.REF }})" >> $GITHUB_OUTPUT

      - name: Prepare Binary (Linux)
        if: runner.os == 'Linux'
        run: |
          ppnpm --filter @bwilliamson/template-engine-cli run build:standalone:linux
          mv packages/template-engine-cli/dist/template-engine-linux dist/template-engine-${{ steps.get_version.outputs.VERSION }}-linux

      - name: Prepare Binary (macOS)
        if: runner.os == 'macOS'
        run: |
          ppnpm --filter @bwilliamson/template-engine-cli run build:standalone:macos
          mv packages/template-engine-cli/dist/template-engine-macos dist/template-engine-${{ steps.get_version.outputs.VERSION }}-macos

      - name: Prepare Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          ppnpm --filter @bwilliamson/template-engine-cli run build:standalone:windows
          mv packages/template-engine-cli/dist/template-engine-win.exe dist/template-engine-${{ steps.get_version.outputs.VERSION }}-win.exe

      # CORRECTED: Use three separate, conditioned steps for uploading.
      # This avoids complex, error-prone expressions and is unambiguously correct.
      - name: Upload Linux Artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: binary-Linux
          path: dist/template-engine-${{ steps.get_version.outputs.VERSION }}-linux

      - name: Upload macOS Artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: binary-macOS
          path: dist/template-engine-${{ steps.get_version.outputs.VERSION }}-macos

      - name: Upload Windows Artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: binary-Windows
          path: dist/template-engine-${{ steps.get_version.outputs.VERSION }}-win.exe

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Determine tag name for release
        id: get_tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "TAG_NAME=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List downloaded files for verification
        run: ls -R dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_tag.outputs.TAG_NAME }}
          name: 'Release ${{ steps.get_tag.outputs.TAG_NAME }}'
          generate_release_notes: true
          files: dist/*/*
