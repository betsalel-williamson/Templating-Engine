name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  HUSKY: 0

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm run test

      - name: Generate core coverage reports
        run: pnpm --filter @bwilliamson/template-engine-core run test -- --coverage
        continue-on-error: true

      - name: Upload HTML coverage report artifact
        uses: actions/upload-artifact@v7
        id: upload_html_coverage
        with:
          name: coverage-report-html
          path: packages/template-engine-core/coverage

      - name: Stage JUnit reports for test-reporter
        if: success() || failure()
        run: git add -f test-results/*.xml

      - name: Report Test Results (JUnit)
        if: success() || failure()
        uses: dorny/test-reporter@v2
        with:
          name: Template Engine Test Results
          path: test-results/*.xml
          reporter: jest-junit
          fail-on-error: true

      - name: Generate Code Coverage Summary for GitHub
        if: always()
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          COVERAGE_JSON_FILE="packages/template-engine-core/coverage/coverage-summary.json"
          COVERAGE_TEXT_FILE="packages/template-engine-core/coverage/text-report.md"
          TOTAL_COVERAGE_PERCENT="N/A"
          COLOR="lightgrey"
          COVERAGE_BADGE_TEXT="no%20report"
          if [ -f "$COVERAGE_JSON_FILE" ]; then
            TOTAL_COVERAGE_PERCENT=$(jq -r '.total.statements.pct' "$COVERAGE_JSON_FILE")
            if [[ "$TOTAL_COVERAGE_PERCENT" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
              TOTAL_COVERAGE_INT=${TOTAL_COVERAGE_PERCENT%.*}
              if [ "$TOTAL_COVERAGE_INT" -ge 90 ]; then COLOR="brightgreen"
              elif [ "$TOTAL_COVERAGE_INT" -ge 75 ]; then COLOR="yellow"
              elif [ "$TOTAL_COVERAGE_INT" -ge 50 ]; then COLOR="orange"
              else COLOR="red"; fi
              COVERAGE_BADGE_TEXT="${TOTAL_COVERAGE_PERCENT}%25"
            fi
          fi
          BADGE_URL="https://img.shields.io/badge/coverage-${COVERAGE_BADGE_TEXT}-${COLOR}"
          BADGE_MARKDOWN="![Coverage]($BADGE_URL)"
          ARTIFACT_ID="${{ steps.upload_html_coverage.outputs.artifact-id }}"
          HTML_REPORT_LINK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${ARTIFACT_ID}"
          {
            echo "### Code Coverage Summary"
            echo ""
            echo "$BADGE_MARKDOWN"
            echo ""
            echo "For a detailed, interactive report, [download the HTML coverage report here](${HTML_REPORT_LINK})."
            echo ""
            echo "<details><summary>Expand for full report</summary>"
            echo ""
            if [ -f "$COVERAGE_TEXT_FILE" ]; then
              tail -n +2 "$COVERAGE_TEXT_FILE" | head -n -1
            else
              echo "No detailed coverage report found at $COVERAGE_TEXT_FILE."
            fi
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  changeset:
    name: Require changeset
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Require changeset when packages change
        run: pnpm exec changeset status --since=${{ github.event.pull_request.base.sha }}
