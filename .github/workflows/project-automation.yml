name: Project automation

on:
  issues:
    types:
      - opened
      - transferred
  pull_request:
    types:
      - opened
      - transferred

jobs:
  add-to-project:
    name: Add to Templating Engine project
    # Enable after adding GH_PROJECT_TOKEN (see docs/developer/project-management.md).
    if: vars.PROJECT_AUTOMATION_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/betsalel-williamson/projects/5
          # GITHUB_TOKEN cannot access user-owned Projects (see GitHub docs).
          # Create a classic PAT with `project` + `repo` scopes and store it as
          # GH_PROJECT_TOKEN in repository secrets.
          github-token: ${{ secrets.GH_PROJECT_TOKEN }}
