name: Project automation

on:
  issues:
    types:
      - opened
      - transferred
  pull_request:
    types:
      - opened
      - transferred

jobs:
  add-to-project:
    name: Add to Templating Engine project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/betsalel-williamson/projects/5
          github-token: ${{ secrets.GITHUB_TOKEN }}
